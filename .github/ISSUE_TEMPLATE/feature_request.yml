name: Feature request
description: Suggest a context hygiene check or workflow improvement
title: "Feature: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What context rot or workflow gap should this solve?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence shape
      description: What files, lines, or facts would prove the finding?
    validations:
      required: true
  - type: textarea
    id: false-positives
    attributes:
      label: False-positive risks
      description: When should Dr. Context avoid reporting this?
