name: Dogfood

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  dr-context:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: CaptainEv1dence/dr-context@v0.1.8
        with:
          root: .
          upload-sarif: 'true'
